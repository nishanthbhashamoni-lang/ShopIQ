<!DOCTYPE html>
<html>
<head>
    <title>ShopIQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f3;
            text-align: center;
            margin: 0;
        }

        .container {
            padding: 60px 20px;
        }

        input {
            width: 60%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #5a7f66;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #486653;
        }

        table {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #e6f0ea;
        }

        .best {
            background: #dff5e8;
            font-weight: bold;
        }

        .badge {
            background: green;
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-left: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ShopIQ</h1>

    <form method="POST">
        <input type="text" name="link" placeholder="Paste product link..." required>
        <button type="submit">Compare</button>
    </form>

    {% if comparison %}
        <h2>{{ product_name }}</h2>

        <table>
            <tr>
                <th>Platform</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Reviews</th>
            </tr>

            {% for item in comparison %}
            <tr class="{% if item.best %}best{% endif %}">
                <td>
                    {{ item.platform }}
                    {% if item.best %}
                        <span class="badge">Best Deal</span>
                    {% endif %}
                </td>
                <td>₹{{ item.price }}</td>
                <td>⭐ {{ item.rating }}</td>
                <td>{{ item.reviews }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}
</div>

</body>
</html>
