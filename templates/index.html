<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopIQ</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f3;
    text-align: center;
}

.search-box {
    margin-top: 60px;
}

input {
    padding: 12px;
    width: 350px;
    border-radius: 30px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    background: #6c8f7c;
    color: white;
    cursor: pointer;
}

.card-container {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.platform-card {
    background: white;
    padding: 20px;
    width: 220px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.platform-card h3 {
    margin-bottom: 10px;
}

.platform-card a {
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    background: #7a9a84;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
}
</style>
</head>

<body>

<h1>ShopIQ</h1>

<div class="search-box">
    <input type="text" id="productLink" placeholder="Paste product link...">
    <button onclick="analyze()">Compare</button>
</div>

<div id="productTitle" style="margin-top:30px;font-weight:bold;"></div>

<div class="card-container" id="results"></div>

<script>
async function analyze() {
    const link = document.getElementById("productLink").value;

    const response = await fetch(`/compare?link=${encodeURIComponent(link)}`);
    const data = await response.json();

    if (!data.success) return;

    document.getElementById("productTitle").innerText = data.product.name;

    const container = document.getElementById("results");
    container.innerHTML = "";

    Object.entries(data.platforms).forEach(([name, info]) => {
        container.innerHTML += `
            <div class="platform-card">
                <h3>${name}</h3>
                <p>Price: ${info.price ? info.price : "Coming Soon"}</p>
                <p>Rating: ${info.rating ? info.rating : "Coming Soon"}</p>
                <a href="${info.url}" target="_blank">View</a>
            </div>
        `;
    });
}
</script>

</body>
</html>
