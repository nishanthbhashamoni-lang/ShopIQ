<!DOCTYPE html>
<html>
<head>

<title>Results - ShopIQ</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<div class="max-w-4xl mx-auto py-16">

<h1 class="text-3xl font-bold text-center mb-10">

{{ product_name }}

</h1>

<table class="w-full bg-white shadow rounded-lg">

<tr class="bg-gray-100">

<th class="p-4">Platform</th>
<th class="p-4">Price</th>
<th class="p-4">Rating</th>
<th class="p-4">Reviews</th>

</tr>

{% for item in comparison %}

<tr class="{% if item.best %}bg-green-100{% endif %}">

<td class="p-4">{{ item.platform }}</td>

<td class="p-4">
₹{{ item.price }}
{% if item.best %}
<span class="text-green-600 font-bold">Best Deal</span>
{% endif %}
</td>

<td class="p-4">⭐ {{ item.rating }}</td>

<td class="p-4">{{ item.reviews }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
