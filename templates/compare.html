<!DOCTYPE html>
<html>

<head>
    <title>Compare - ShopIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-950 text-white">

<!-- NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">

    <div class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="w-8 h-8 rounded-full">
        <h1 class="text-xl font-bold text-green-500">ShopIQ</h1>
    </div>

    <a href="/" class="text-sm text-gray-300">Home</a>

</div>

<!-- CONTENT -->
<div class="px-4 md:px-20 mt-10">

    {% if prices %}

    <h2 class="text-2xl md:text-3xl font-bold text-center mb-10">
        Compare Results
    </h2>

    <div class="overflow-x-auto">

        <table class="w-full bg-gray-900 rounded-xl overflow-hidden">

            <thead class="bg-gray-800">
                <tr>
                    <th class="py-3 px-4 text-left">Platform</th>
                    <th class="py-3 px-4 text-left">Price</th>
                    <th class="py-3 px-4 text-left">Action</th>
                </tr>
            </thead>

            <tbody>

                {% for platform, price in prices.items() %}
                <tr class="border-b border-gray-800">

                    <td class="py-4 px-4 font-semibold">
                        {{ platform }}
                    </td>

                    <td class="py-4 px-4">
                        ₹{{ price }}
                    </td>

                    <td class="py-4 px-4">

                        <a href="{{ product_link }}" target="_blank"
                            class="bg-green-600 px-4 py-2 rounded hover:bg-green-700">
                            View Deal
                        </a>

                        {% if price == best_price %}
                        <span class="ml-2 text-green-400 font-semibold">
                            🔥 Best
                        </span>
                        {% endif %}

                    </td>

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

    {% else %}

    <div class="text-center mt-20 text-gray-400">
        No data available. Please go back and paste a product link.
    </div>

    {% endif %}

</div>

</body>
</html>
