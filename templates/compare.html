<!DOCTYPE html>
<html>
<head>
    <title>Compare - ShopIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white">

<!-- NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
    <div class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="w-8 h-8 rounded-full">
        <h1 class="text-xl font-bold text-green-500">ShopIQ</h1>
    </div>

    <a href="/" class="text-gray-300">Home</a>
</div>

<!-- CONTENT -->
<div class="px-6 md:px-20 mt-10 text-center">

    {% if prices %}

    <h2 class="text-3xl font-bold mb-2">Compare Results</h2>

    <p class="text-gray-400 mb-6">
        Searching for:
        <span class="text-white font-semibold">{{ query }}</span>
    </p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        {% for platform in prices %}

        <div class="bg-gray-900 p-6 rounded-xl shadow-lg hover:scale-105 transition">

            <h3 class="text-xl font-semibold mb-2">
                {{ platform }}
            </h3>

            <p class="text-green-400 text-lg mb-4">
                {{ prices[platform] }}
            </p>

            <a href="{{ links[platform] }}" target="_blank"
               class="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-700">
               View Deal 🔗
            </a>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <p class="text-gray-400 mt-20">
        No data available.
    </p>

    {% endif %}

</div>

</body>
</html>
