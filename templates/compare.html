<!DOCTYPE html>
<html>

<head>
    <title>Compare - ShopIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white">

<!-- NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
    <div class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="w-8 h-8 rounded-full">
        <h1 class="text-xl font-bold text-green-500">ShopIQ</h1>
    </div>

    <a href="/" class="text-gray-300">Home</a>
</div>

<!-- CONTENT -->
<div class="px-6 md:px-20 mt-10">

    {% if links %}

    <h2 class="text-2xl md:text-3xl font-bold text-center mb-4">
        Compare Deals
    </h2>

    <p class="text-center text-gray-400 mb-2">
        Searching for:
        <span class="text-white font-semibold">{{ query }}</span>
    </p>

    <p class="text-center text-gray-500 mb-8">
        Showing similar products across platforms
    </p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        {% for platform, link in links.items() %}

        <div class="bg-gray-900 p-6 rounded-xl text-center shadow-lg hover:scale-105 transition">

            <h3 class="text-xl font-semibold mb-4">
                {{ platform }}
            </h3>

            <a href="{{ link }}" target="_blank"
               class="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-700">
               View Deal 🔗
            </a>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <div class="text-center text-gray-400 mt-20">
        No data available. Please go back and paste a product link.
    </div>

    {% endif %}

</div>

</body>
</html>
