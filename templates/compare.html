<!DOCTYPE html>
<html>

<head>

<title>Comparison</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-16">

<div class="bg-white p-6 rounded-lg shadow mb-8 text-center">

{% if image %}
<img src="{{image}}" class="mx-auto h-40 mb-4">
{% endif %}

<h1 class="text-2xl font-bold">
{{product}}
</h1>

</div>

<table class="w-full bg-white shadow rounded-lg">

<thead class="bg-gray-200">

<tr>
<th class="p-4 text-left">Platform</th>
<th class="p-4 text-left">Price</th>
<th class="p-4 text-right">Deal</th>
</tr>

</thead>

<tbody>

{% for item in results %}

<tr class="border-t">

<td class="p-4">{{item.platform}}</td>

<td class="p-4">

₹{{item.price}}

{% if item.best %}
<span class="bg-green-200 text-green-800 px-2 py-1 rounded text-xs ml-2">
🔥 Best Deal
</span>
{% endif %}

</td>

<td class="p-4 text-right">

<a href="{{item.link}}" target="_blank"
class="bg-green-600 text-white px-4 py-2 rounded">

View Deal

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
